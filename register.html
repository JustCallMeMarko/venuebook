<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueBook | Create Account</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/register.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="/assets/images/Logo.svg" alt="Logo" class="logo-img">
            <span class="logo-text">VENUEBOOK</span>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="signup-card">
            <h2>Create your account</h2>
            <p class="subtitle">Get started — it's free to register</p>

            <p class="section-label">I am a</p>
            <div class="role-container">
                <div class="role-card active" onclick="selectRole(this)">
                    <span class="icon">📁</span>
                    <span class="role-title">Event organizer</span>
                </div>
                <div class="role-card" onclick="selectRole(this)">
                    <span class="icon">🏢</span>
                    <span class="role-title">Venue coordinator</span>
                </div>
            </div>

            <form action="#">
                <div class="form-row">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Juan">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Cruz">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@company.com">
                </div>

                <div class="input-group">
                    <label>Company / Organization Name</label>
                    <input type="text" placeholder="you@company.com">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="********">
                </div>

                <div class="forgot-link-wrapper">
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn">Create account</button>
            </form>

            <p class="bottom-text">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        function selectRole(element) {
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('active');
            });
            element.classList.add('active');
        }
    </script>

</body>
</html>
